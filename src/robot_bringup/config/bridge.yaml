# ros_gz_bridge configuration
# Actual Gazebo topic names discovered via: ign topic -l (Day 10 Step 1)

# ── Clock (sim time) ──────────────────────────────────────────────────────────
- ros_topic_name: "/clock"
  gz_topic_name:  "/clock"
  ros_type_name:  "rosgraph_msgs/msg/Clock"
  gz_type_name:   "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ── Drive control ─────────────────────────────────────────────────────────────
- ros_topic_name: "/cmd_vel"
  gz_topic_name:  "/model/robotcar/cmd_vel"
  ros_type_name:  "geometry_msgs/msg/Twist"
  gz_type_name:   "gz.msgs.Twist"
  direction: ROS_TO_GZ

# ── Odometry ──────────────────────────────────────────────────────────────────
- ros_topic_name: "/odom"
  gz_topic_name:  "/model/robotcar/odometry"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ── IMU (noisy, fused by EKF) ────────────────────────────────────────────────
- ros_topic_name: "/imu"
  gz_topic_name:  "/imu"
  ros_type_name:  "sensor_msgs/msg/Imu"
  gz_type_name:   "gz.msgs.IMU"
  direction: GZ_TO_ROS

# ── Ground-truth odometry (OdometryPublisher, no drift) ──────────────────────
- ros_topic_name: "/odom_truth"
  gz_topic_name:  "/model/robotcar/odometry_truth"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ── TF: odom -> base_link is bridged from the GROUND-TRUTH OdometryPublisher
#    (tf_truth), so RViz renders the robot at its true sim pose. The EKF's own
#    TF is disabled (ekf.yaml publish_tf: false) to avoid two publishers of the
#    same transform. The wheel estimate is still on /odom as EKF input; do NOT
#    bridge /model/robotcar/tf (that is the drifting wheel estimate).

#    EKF publishes /tf, which is bridged to /model/robotcar/tf_ekf for Gazebo plugins that need it.

# - ros_topic_name: "/tf"
#   gz_topic_name:  "/model/robotcar/tf_truth"
#   ros_type_name:  "tf2_msgs/msg/TFMessage"
#   gz_type_name:   "gz.msgs.Pose_V"
#   direction: GZ_TO_ROS

# ── Joint states ──────────────────────────────────────────────────────────────
- ros_topic_name: "/joint_states"
  gz_topic_name:  "/world/cone_lane/model/robotcar/joint_state"
  ros_type_name:  "sensor_msgs/msg/JointState"
  gz_type_name:   "gz.msgs.Model"
  direction: GZ_TO_ROS

# ── Front camera — RGB image ──────────────────────────────────────────────────
- ros_topic_name: "/camera/front/image_raw"
  gz_topic_name:  "/camera/front/image"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction: GZ_TO_ROS

# ── Front camera — camera info ────────────────────────────────────────────────
- ros_topic_name: "/camera/front/camera_info"
  gz_topic_name:  "/camera/front/camera_info"
  ros_type_name:  "sensor_msgs/msg/CameraInfo"
  gz_type_name:   "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# ── Front camera — depth image ────────────────────────────────────────────────
- ros_topic_name: "/camera/front/depth/image_raw"
  gz_topic_name:  "/camera/front/depth_image"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction: GZ_TO_ROS

# ── Front camera — point cloud ────────────────────────────────────────────────
- ros_topic_name: "/camera/front/points"
  gz_topic_name:  "/camera/front/points"
  ros_type_name:  "sensor_msgs/msg/PointCloud2"
  gz_type_name:   "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
